<!-- Dark mode stylesheet (initially disabled; enabled via JS when needed) -->
<link rel="stylesheet" href="{{ '/assets/css/just-the-docs-dark.css' | relative_url }}" id="dark-mode-css" disabled>

<style>
  /* Dark mode toggle button — clean icon button in the header */
  #color-scheme-toggle {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: none;
    border: none;
    padding: 0 0.6rem;
    cursor: pointer;
    color: var(--body-text-color, #5c5962);
    transition: color 0.2s;
    line-height: 1;
  }
  #color-scheme-toggle:hover {
    color: var(--link-color, #7253ed);
  }
  #color-scheme-toggle svg {
    display: block;
    transition: transform 0.35s ease;
  }
  #color-scheme-toggle.toggling svg {
    transform: rotate(0.5turn);
  }
  /* Show/hide icons based on current mode */
  .icon-sun { display: block; }
  .icon-moon { display: none; }
  .dark-mode .icon-sun { display: none; }
  .dark-mode .icon-moon { display: block; }
</style>

<script>
  (function() {
    var STORAGE_KEY = 'ask-docs-color-scheme';
    var darkCss = document.getElementById('dark-mode-css');

    function setColorScheme(scheme) {
      if (scheme === 'dark') {
        darkCss.removeAttribute('disabled');
        document.documentElement.classList.add('dark-mode');
      } else {
        darkCss.setAttribute('disabled', '');
        document.documentElement.classList.remove('dark-mode');
      }
    }

    // Determine initial scheme: stored preference > system preference > light
    var stored = localStorage.getItem(STORAGE_KEY);
    if (stored) {
      setColorScheme(stored);
    } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
      setColorScheme('dark');
    }

    // Listen for system preference changes (only applies when no stored preference)
    if (window.matchMedia) {
      var media = window.matchMedia('(prefers-color-scheme: dark)');
      media.addEventListener('change', function(e) {
        if (!localStorage.getItem(STORAGE_KEY)) {
          setColorScheme(e.matches ? 'dark' : 'light');
        }
      });
    }

    // Expose toggle function globally
    window.toggleColorScheme = function() {
      var btn = document.getElementById('color-scheme-toggle');
      var isDark = document.documentElement.classList.contains('dark-mode');
      var newScheme = isDark ? 'light' : 'dark';
      setColorScheme(newScheme);
      localStorage.setItem(STORAGE_KEY, newScheme);
      // Brief rotation animation
      btn.classList.add('toggling');
      setTimeout(function() { btn.classList.remove('toggling'); }, 400);
    };
  })();
</script>
