title: ask-rb
description: >-
  A Ruby ecosystem for building LLM-powered applications —
  web agents, coding assistants, desktop apps, and automated workflows.
url: "https://ask-rb.github.io"
baseurl: "/ask-docs"
repository: ask-rb/ask-docs

theme: just-the-docs

aux_links:
  "ask-rb on GitHub":
    - "https://github.com/ask-rb"

callouts:
  highlight:
    color: yellow
  important:
    title: Important
    color: blue
  new:
    title: New
    color: green
  note:
    title: Note
    color: purple

collections:
  docs:
    permalink: "/:collection/:path/"
    output: true

just_the_docs:
  navigation:
    - title: Home
      url: /
    - title: ask-core
      url: /core
    - title: ask-auth
      url: /core/ask-auth
    - title: ask-llm-providers
      url: /providers/ask-llm-providers
    - title: ask-slack
      url: /core/ask-slack
    - title: ask-notion
      url: /core/ask-notion
    - title: ask-sentry
      url: /core/ask-sentry
    - title: ask-honeybadger
    - title: ask-mcp
      url: /core/ask-mcp      url: /core/ask-honeybadger
    - title: ask-agent
      url: /agent
    - title: ask-tools
      url: /tools
    - title: Providers
      url: /providers
    - title: Design
      url: /design

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-github-metadata

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
